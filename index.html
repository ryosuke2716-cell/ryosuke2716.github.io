<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANK!NG FOR E$CAPE THE L!M!NAL SPA€E</title>
    <link rel="icon" href="app-icon.png">
    <style>
        body {
            font-family: sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: #fcc800;
        }
        h1 {
            text-align: center;
        }
        .team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            background: white;
            font-family: sans-serif;
        }
        .rank {
            font-size: 1.4rem;
            font-weight: bold;
        }
        .score {
            font-weight: bold;
        }
        #error {
            color: red;
            white-space: pre-wrap;
            margin: 20px 0;
        }
        #intro {
            font-size:8px;
            text-align:center;
        }
    </style>
</head>
<body>

    <h1>Ranking for Escape the Liminal Space</h1>
    <div id=intro>リアルタイムでランキングは更新されています。更新できない場合はリロードしてください</div>
    <div id="error"></div>
    <div id="ranking"></div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1rLMuDIazWZh5E6EjqJVqAKklIqeuj014oobgWL2vaK4/export?format=csv&gid=0";

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                if (!res.ok) {
                    throw new Error("HTTP Error: " + res.status);
                }
                const text = await res.text();
                console.log(text);
                const rows = text.trim().split(/\r?\n/);
                const teams = [];

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(",");
                    if (cols.length < 3) continue;
                    teams.push({
                        rank: Number(cols[0]),
                        score: Number(cols[1]),
                        name: cols[2].trim()
                    });
                }

                teams.sort((a, b) => b.score - a.score);
                renderRanking(teams);
            } catch (err) {
                console.error(err);
                document.getElementById("error").textContent = "エラー:\n" + err;
            }
        }

        function renderRanking(teams) {
            const ranking = document.getElementById("ranking");
            ranking.innerHTML = "";

            teams.forEach((team, index) => {
                ranking.innerHTML += `
                    <div class="team">
                        <div class="rank">
                            ${index + 1}位
                        </div>
                        <div>
                            ${team.name}
                        </div>
                        <div class="score">
                            ${team.score} 点
                        </div>
                    </div>
                `;
            });
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
